name: Auto-label Issues

on:
  issues:
    types: [opened]

permissions:
  issues: write

jobs:
  auto-label:
    runs-on: ubuntu-latest
    steps:
      - name: Auto-label from title tags
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const title = issue.title;
            const body = issue.body || '';
            const labelsToAdd = [];

            // Parse [table:xxx] from title
            const tableMatch = title.match(/\[table:([^\]]+)\]/);
            if (tableMatch) {
              labelsToAdd.push(`table:${tableMatch[1]}`);
            }

            // Parse [column:xxx] from title
            const columnMatch = title.match(/\[column:([^\]]+)\]/);
            if (columnMatch) {
              labelsToAdd.push(`column:${columnMatch[1]}`);
            }

            // Parse priority from body
            const priorityMatch = body.match(/\*\*Priority:\*\*\s*(low|medium|high)/i);
            if (priorityMatch) {
              labelsToAdd.push(`priority:${priorityMatch[1].toLowerCase()}`);
            }

            if (labelsToAdd.length === 0) {
              console.log('No tags found in title, skipping');
              return;
            }

            console.log(`Adding labels: ${labelsToAdd.join(', ')}`);

            // Ensure labels exist (create if missing)
            const existingLabels = await github.rest.issues.listLabelsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100,
            });
            const existingNames = new Set(existingLabels.data.map(l => l.name));

            // Color scheme for auto-created labels
            const colorMap = {
              'table:': '0969da',    // blue
              'column:': '8250df',   // purple
              'priority:low': '2da44e',
              'priority:medium': 'bf8700',
              'priority:high': 'cf222e',
            };

            function getColor(labelName) {
              if (labelName.startsWith('table:')) return colorMap['table:'];
              if (labelName.startsWith('column:')) return colorMap['column:'];
              return colorMap[labelName] || 'd0d7de';
            }

            for (const label of labelsToAdd) {
              if (!existingNames.has(label)) {
                console.log(`Creating label: ${label}`);
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: label,
                  color: getColor(label),
                });
              }
            }

            // Apply labels to issue
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              labels: labelsToAdd,
            });

            console.log(`Labels applied to issue #${issue.number}`);
